name: Build Videos JSON

on:
  push:
    paths:
      - 'content/**'
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate videos.json
        run: |
          python3 << 'PYEOF'
          import os, json, yaml, glob

          def load_videos(folder):
              videos = []
              if not os.path.exists(folder):
                  return videos
              for filepath in glob.glob(os.path.join(folder, '*.md')):
                  with open(filepath, 'r') as f:
                      text = f.read()
                  if not text.startswith('---'):
                      continue
                  end = text.find('---', 3)
                  if end == -1:
                      continue
                  front = text[3:end].strip()
                  try:
                      data = yaml.safe_load(front)
                  except:
                      continue
                  if not data or not data.get('title'):
                      continue
                  thumb = data.get('thumb', '') or ''
                  if thumb and not thumb.startswith('http'):
                      thumb = '/' + thumb.lstrip('/')
                  # Fix duration - YAML reads 2:23 as sexagesimal (143)
                  raw_dur = data.get('duration', '0:00')
                  if isinstance(raw_dur, int):
                      mins = raw_dur // 60
                      secs = raw_dur % 60
                      raw_dur = f"{mins}:{secs:02d}"
                  videos.append({
                      'title': str(data.get('title', '')),
                      'desc': str(data.get('desc', '')),
                      'code': str(data.get('code', '')),
                      'duration': str(raw_dur),
                      'tags': data.get('tags', []) or [],
                      'thumb': thumb,
                      'chatLink': str(data.get('chatLink', 'https://onlyfans.com/my/chats/chat/38191075/')),
                      'sale': data.get('sale', False) is True,
                      'order': int(data.get('order', 99))
                  })
              videos.sort(key=lambda v: v.get('order', 99))
              return videos

          settings = {}
          sections_path = 'content/settings/sections.md'
          if os.path.exists(sections_path):
              with open(sections_path, 'r') as f:
                  text = f.read()
              if text.startswith('---'):
                  end = text.find('---', 3)
                  if end != -1:
                      try:
                          s = yaml.safe_load(text[3:end].strip())
                          settings['featuredTitle'] = s.get('featuredTitle', 'Featured')
                          settings['gridTitle'] = s.get('gridTitle', 'All Videos')
                      except:
                          pass

          promo_path = 'content/settings/promo.md'
          if os.path.exists(promo_path):
              with open(promo_path, 'r') as f:
                  text = f.read()
              if text.startswith('---'):
                  end = text.find('---', 3)
                  if end != -1:
                      try:
                          p = yaml.safe_load(text[3:end].strip())
                          settings['promoActive'] = p.get('active', True)
                          settings['promoText'] = p.get('text', '')
                      except:
                          pass

          result = {
              'featured': load_videos('content/featured'),
              'videos': load_videos('content/videos'),
              'settings': settings
          }

          with open('videos.json', 'w') as f:
              json.dump(result, f, indent=2)

          print(f"Generated videos.json: {len(result['featured'])} featured, {len(result['videos'])} grid videos")
          PYEOF

      - name: Commit videos.json
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add videos.json
          git diff --cached --quiet || git commit -m "Auto-update videos.json"
          git push
